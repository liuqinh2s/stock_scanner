<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股股票扫描器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0a0e17;
            color: #e1e8f0;
            min-height: 100vh;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 24px 0 16px;
        }

        h1 {
            font-size: 28px;
            color: #e53935;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #7a8599;
            font-size: 13px;
            margin-top: 4px;
        }

        .filter-desc {
            color: #5a6a80;
            font-size: 11px;
            margin-top: 6px;
            line-height: 1.6;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        .stat {
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 12px 20px;
            text-align: center;
            min-width: 130px;
        }

        .stat .label {
            display: block;
            font-size: 11px;
            color: #5a6a80;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .stat .val {
            display: block;
            font-size: 18px;
            font-weight: 700;
            color: #e1e8f0;
            margin-top: 4px;
        }

        .stat .val.up {
            color: #00c853;
        }

        .stat .val.down {
            color: #ff4d4f;
        }

        .stat .val.neutral {
            color: #e53935;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        button {
            background: #1e2a3a;
            color: #e1e8f0;
            border: 1px solid #2a3a50;
            border-radius: 6px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all .2s;
        }

        button:hover {
            background: #e53935;
            color: #fff;
            border-color: #e53935;
        }

        button.active {
            background: #e53935;
            color: #fff;
            border-color: #e53935;
        }

        .tag-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 12px;
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
        }

        .tag-filter {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #2a3a50;
            background: #1e2a3a;
            color: #e1e8f0;
            transition: all .2s;
            user-select: none;
        }

        .tag-filter:hover {
            border-color: #e53935;
            color: #e53935;
        }

        .tag-filter.active {
            background: #e53935;
            color: #fff;
            border-color: #e53935;
        }

        .tag-filter .count {
            background: rgba(255, 255, 255, 0.15);
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 10px;
        }

        .tag-filter.active .count {
            background: rgba(0, 0, 0, 0.2);
        }

        .tag-filter.disabled {
            cursor: default;
            opacity: 0.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th {
            background: #141924;
            color: #7a8599;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #1e2a3a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #111827;
            font-size: 13px;
        }

        tr:hover td {
            background: #111827;
        }

        .symbol-link {
            color: #8ecdf7;
            text-decoration: none;
            font-weight: 600;
        }

        .symbol-link:hover {
            text-decoration: underline;
        }

        .symbol-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn,
        .eastmoney-link {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #2a3a50;
            background: #1e2a3a;
            color: #7a8599;
            text-decoration: none;
            transition: all .2s;
            white-space: nowrap;
        }

        .copy-btn:hover,
        .eastmoney-link:hover {
            background: #e53935;
            color: #fff;
            border-color: #e53935;
        }

        .price-up {
            color: #ff4d4f;
        }

        .price-down {
            color: #00c853;
        }

        .tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 1px 3px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .tag:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .tag-volume {
            background: #e040fb;
            color: #fff;
        }

        .tag-trend {
            background: #2196f3;
            color: #fff;
        }

        .tag-index {
            background: #e53935;
            color: #fff;
            cursor: default;
        }

        .tag-index:hover {
            transform: none;
        }

        .tag-safe {
            background: #00c853;
            color: #fff;
        }

        .tag-leading {
            background: #ff6d00;
            color: #fff;
        }

        .tag-fairy {
            background: #7c4dff;
            color: #fff;
        }

        .tag-volatile {
            background: #26a69a;
            color: #fff;
        }

        .tag-lowvol {
            background: #78909c;
            color: #fff;
        }

        .tag-breakout {
            background: #d50000;
            color: #fff;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #5a6a80;
        }

        .hidden {
            display: none !important;
        }

        .history-panel {
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-panel h3 {
            color: #e53935;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .hist-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #1e2a3a;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .hist-row:hover {
            background: #1e2a3a;
        }

        .hist-row .ht {
            color: #7a8599;
        }

        .hist-row .hv {
            color: #e53935;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
        }

        .search-box input {
            background: #141924;
            border: 1px solid #2a3a50;
            border-radius: 6px;
            padding: 8px 14px;
            color: #e1e8f0;
            font-size: 13px;
            width: 280px;
            outline: none;
            transition: border-color .2s;
        }

        .search-box input:focus {
            border-color: #e53935;
        }

        .search-box input::placeholder {
            color: #5a6a80;
        }

        .search-results {
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            max-height: 500px;
            overflow-y: auto;
        }

        .search-results h3 {
            color: #e53935;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .search-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #1e2a3a;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .search-result-item:hover {
            background: #1e2a3a;
        }

        .search-result-item .sr-symbol {
            color: #8ecdf7;
            font-weight: 600;
            font-size: 13px;
            min-width: 120px;
        }

        .search-result-item .sr-time {
            color: #7a8599;
        }

        .search-result-item .sr-price {
            color: #e1e8f0;
        }

        .search-result-item .sr-tags {
            flex-basis: 100%;
            margin-top: 4px;
        }

        .search-loading {
            color: #5a6a80;
            font-size: 12px;
            text-align: center;
            padding: 12px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #e53935;
            color: #fff;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            z-index: 999;
            transition: opacity .3s;
        }

        .card-list {
            display: none;
        }

        @media (max-width: 900px) {
            #tokenTable table {
                display: none;
            }

            .card-list {
                display: block;
            }

            .token-card {
                background: #141924;
                border: 1px solid #1e2a3a;
                border-radius: 10px;
                padding: 14px;
                margin-bottom: 10px;
            }

            .card-top {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 8px;
                gap: 12px;
            }

            .card-symbol {
                font-size: 16px;
                font-weight: 700;
                color: #8ecdf7;
            }

            .card-price {
                font-size: 15px;
                font-weight: 600;
                text-align: right;
                flex-shrink: 0;
            }

            .card-tags {
                margin: 8px 0;
            }

            .card-meta {
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: #5a6a80;
                margin-top: 6px;
            }

            .card-prices {
                display: flex;
                align-items: center;
                gap: 16px;
                font-size: 12px;
                color: #7a8599;
                margin-top: 6px;
                font-variant-numeric: tabular-nums;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <h1>🔍 A股股票扫描器</h1>
            <p class="subtitle">沪深A股 · 多周期趋势共振选股</p>
            <p class="filter-desc">
                默认组合：趋势共振 + 波动充足 + 未追高（点击标签可自由增减组合）<br>
                可选标签：成交量异动 · 龙头股 · 仙人指路 · 小量大涨 · 盘整突破<br>
                大盘方向为全局条件，不可作为筛选标签
            </p>
        </header>

        <div class="stats-bar" id="statsBar">
            <div class="stat"><span class="label">扫描时间</span><span class="val" id="scanTime">--</span></div>
            <div class="stat"><span class="label">股票总数</span><span class="val" id="totalSymbols">--</span></div>
            <div class="stat"><span class="label">可分析</span><span class="val" id="validSymbols">--</span></div>
            <div class="stat"><span class="label">筛选通过</span><span class="val" id="filteredCount">--</span></div>
            <div class="stat"><span class="label">大盘方向</span><span class="val" id="indexDirection">--</span></div>
            <div class="stat"><span class="label">耗时</span><span class="val" id="elapsed">--</span></div>
        </div>

        <div class="actions">
            <button id="btnHistory" onclick="toggleHistory()">📋 历史记录</button>
            <button id="btnLatest" onclick="goLatest()">回到当前</button>
            <button onclick="clearFilter()">🏠 恢复默认</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索股票代码、名称或标签（如 000001、盘整突破）…" aria-label="搜索股票代码、名称或标签">
            <button onclick="doSearch()">🔍 搜索历史</button>
            <button id="btnClearSearch" onclick="clearSearch()" class="hidden">✕ 清除</button>
        </div>

        <div id="searchResults" class="search-results hidden"></div>
        <div id="tagBar" class="tag-bar hidden"></div>
        <div id="historyPanel" class="history-panel hidden">
            <h3>扫描历史</h3>
            <div id="historyList"></div>
        </div>

        <div id="tokenTable">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>股票</th>
                        <th>价格</th>
                        <th>涨跌幅</th>
                        <th>最高/最低</th>
                        <th>标签</th>
                    </tr>
                </thead>
                <tbody id="tokenBody"></tbody>
            </table>
            <p id="noData" class="no-data hidden">当前标签下暂无符合条件的股票。</p>
            <div id="cardList" class="card-list"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script>
        let currentData = null;
        const DEFAULT_FILTER = ['趋势共振', '波动充足', '未追高'];
        let activeTagFilter = [...DEFAULT_FILTER];
        let historyVisible = false;
        const cache = {};

        const TAG_STYLES = {
            '趋势共振': 'tag-trend',
            '成交量异动': 'tag-volume',
            '大盘看多': 'tag-index',
            '未追高': 'tag-safe',
            '龙头股': 'tag-leading',
            '仙人指路': 'tag-fairy',
            '波动充足': 'tag-volatile',
            '小量大涨': 'tag-lowvol',
            '盘整突破': 'tag-breakout',
        };

        const NON_FILTERABLE = new Set(['大盘看多']);

        function getTagClass(tag) {
            for (const [key, cls] of Object.entries(TAG_STYLES)) {
                if (tag.startsWith(key) || tag.includes(key)) return cls;
            }
            return 'tag-volatile';
        }

        function getTagKey(tag) {
            for (const key of Object.keys(TAG_STYLES)) {
                if (tag.startsWith(key) || tag.includes(key)) return key;
            }
            return tag;
        }

        function isFilterable(tag) { return !NON_FILTERABLE.has(getTagKey(tag)); }

        async function cachedFetch(url, bustCache) {
            if (!bustCache && cache[url]) return cache[url];
            const fetchUrl = bustCache ? url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now() : url;
            const res = await fetch(fetchUrl);
            const data = await res.json();
            cache[url] = data;
            return data;
        }

        async function loadLatest() {
            try {
                const data = await cachedFetch('/api/latest', true);
                currentData = data;
                renderData(data);
            } catch (e) { console.error(e); }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function fmtPrice(p) {
            if (!p || p === 0) return '--';
            if (p < 1) return p.toFixed(4);
            if (p < 100) return p.toFixed(2);
            return p.toFixed(2);
        }

        function getEastmoneyUrl(code) {
            // 沪市6开头用sh，深市0/3开头用sz
            const prefix = code.startsWith('6') ? '1.' : '0.';
            return `https://quote.eastmoney.com/${(code.startsWith('6') ? 'sh' : 'sz') + code}.html`;
        }

        function renderData(data) {
            document.getElementById('scanTime').textContent = data.scanTime || '--';
            document.getElementById('totalSymbols').textContent =
                data.totalSymbols != null ? data.totalSymbols.toLocaleString() : '--';
            document.getElementById('validSymbols').textContent =
                data.validSymbols != null ? data.validSymbols.toLocaleString() : '--';
            document.getElementById('filteredCount').textContent =
                data.filteredCount != null ? data.filteredCount.toLocaleString() : '--';
            document.getElementById('elapsed').textContent =
                data.elapsed != null ? data.elapsed + 's' : '--';

            const idxEl = document.getElementById('indexDirection');
            const dir = data.indexDirection || 'unknown';
            idxEl.textContent = dir === 'up' ? '📈 看多' : dir === 'down' ? '📉 看空' : '➡️ 中性';
            idxEl.className = 'val ' + (dir === 'up' ? 'up' : dir === 'down' ? 'down' : 'neutral');

            let tokens = data.tokens || [];
            if (activeTagFilter.length > 0) {
                tokens = tokens.filter(t =>
                    activeTagFilter.every(f => t.tags.some(tag => getTagKey(tag) === f))
                );
            }
            renderTagBar(data.tokens || []);
            renderTable(tokens);
            renderCards(tokens);
            const noData = document.getElementById('noData');
            noData.classList.toggle('hidden', tokens.length > 0);
        }

        function renderTagBar(tokens) {
            const tagBar = document.getElementById('tagBar');
            const tagCounts = {};
            for (const t of tokens) {
                for (const tag of t.tags) {
                    const key = getTagKey(tag);
                    tagCounts[key] = (tagCounts[key] || 0) + 1;
                }
            }
            if (Object.keys(tagCounts).length === 0) { tagBar.classList.add('hidden'); return; }
            tagBar.classList.remove('hidden');
            const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
            tagBar.innerHTML = sorted.map(([key, count]) => {
                const isActive = activeTagFilter.includes(key) ? ' active' : '';
                const filterable = !NON_FILTERABLE.has(key);
                const onclick = filterable ? `onclick="filterByTag('${esc(key)}')"` : '';
                const disabledCls = filterable ? '' : ' disabled';
                const title = filterable
                    ? `title="点击切换: ${esc(key)}"`
                    : `title="${esc(key)}（全局条件，不可筛选）"`;
                return `<span class="tag-filter${isActive}${disabledCls}" ${onclick} ${title}>
                    ${esc(key)} <span class="count">${count}</span></span>`;
            }).join('');
        }

        function filterByTag(tagKey) {
            const idx = activeTagFilter.indexOf(tagKey);
            if (idx >= 0) activeTagFilter.splice(idx, 1);
            else activeTagFilter.push(tagKey);
            if (currentData) renderData(currentData);
        }

        function clearFilter() {
            activeTagFilter = [...DEFAULT_FILTER];
            if (currentData) renderData(currentData);
            showToast('已恢复默认组合');
        }

        function buildTags(tags) {
            return tags.map(tag => {
                const cls = getTagClass(tag);
                const key = getTagKey(tag);
                const filterable = isFilterable(tag);
                const onclick = filterable
                    ? `onclick="event.stopPropagation();selectSingleTag('${esc(key)}')"` : '';
                const title = filterable ? `title="点击筛选: ${esc(key)}"` : `title="${esc(tag)}"`;
                return `<span class="tag ${cls}" ${onclick} ${title}>${esc(tag)}</span>`;
            }).join('');
        }

        function selectSingleTag(tagKey) {
            activeTagFilter = [tagKey];
            if (currentData) renderData(currentData);
        }

        function renderTable(tokens) {
            const tbody = document.getElementById('tokenBody');
            tbody.innerHTML = tokens.map((t, i) => {
                const changeCls = t.change_pct >= 0 ? 'price-up' : 'price-down';
                const changeSign = t.change_pct >= 0 ? '+' : '';
                const code = esc(t.code);
                const name = esc(t.name || '');
                const emUrl = getEastmoneyUrl(t.code);
                return `<tr>
                    <td>${i + 1}</td>
                    <td>
                        <span class="symbol-actions">
                            <a class="symbol-link" href="${emUrl}" target="_blank" rel="noopener">${code} ${name}</a>
                            <span class="copy-btn" onclick="copyText('${code}')">复制</span>
                            <a class="eastmoney-link" href="${emUrl}" target="_blank" rel="noopener">东财</a>
                        </span>
                    </td>
                    <td>${fmtPrice(t.price)}</td>
                    <td class="${changeCls}">${changeSign}${t.change_pct}%</td>
                    <td style="font-size:11px;color:#7a8599">H: ${fmtPrice(t.high_24h)}<br>L: ${fmtPrice(t.low_24h)}</td>
                    <td>${buildTags(t.tags)}</td>
                </tr>`;
            }).join('');
        }

        function renderCards(tokens) {
            const cardList = document.getElementById('cardList');
            cardList.innerHTML = tokens.map((t, i) => {
                const changeCls = t.change_pct >= 0 ? 'price-up' : 'price-down';
                const changeSign = t.change_pct >= 0 ? '+' : '';
                const code = esc(t.code);
                const name = esc(t.name || '');
                const emUrl = getEastmoneyUrl(t.code);
                return `<div class="token-card">
                    <div class="card-top">
                        <span class="symbol-actions">
                            <a class="symbol-link card-symbol" href="${emUrl}" target="_blank">${code} ${name}</a>
                            <span class="copy-btn" onclick="copyText('${code}')">复制</span>
                        </span>
                        <span class="card-price ${changeCls}">${fmtPrice(t.price)} (${changeSign}${t.change_pct}%)</span>
                    </div>
                    <div class="card-tags">${buildTags(t.tags)}</div>
                    <div class="card-prices">
                        <span>H: ${fmtPrice(t.high_24h)}</span>
                        <span>L: ${fmtPrice(t.low_24h)}</span>
                    </div>
                    <div class="card-meta"><span>#${i + 1}</span></div>
                </div>`;
            }).join('');
        }

        async function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            historyVisible = !historyVisible;
            if (historyVisible) {
                panel.classList.remove('hidden');
                try {
                    const rows = await cachedFetch('/api/history');
                    const list = document.getElementById('historyList');
                    if (!rows || rows.length === 0) {
                        list.innerHTML = '<p style="color:#5a6a80;font-size:12px;">暂无历史记录。</p>';
                        return;
                    }
                    list.innerHTML = rows.map(r => `
                        <div class="hist-row" onclick="loadScan(${r.id})">
                            <span class="ht">${esc(r.scan_time || '--')}</span>
                            <span>股票: ${r.total_symbols || 0} | 筛选: <span class="hv">${r.filtered_count || 0}</span></span>
                        </div>`).join('');
                } catch (e) { console.error(e); }
            } else {
                panel.classList.add('hidden');
            }
        }

        async function loadScan(id) {
            try {
                const data = await cachedFetch('/api/scan/' + id);
                currentData = data;
                activeTagFilter = [...DEFAULT_FILTER];
                renderData(data);
                showToast('已加载扫描 #' + id);
            } catch (e) { showToast('加载失败'); }
        }

        async function goLatest() {
            try {
                const data = await cachedFetch('/api/latest', true);
                currentData = data;
                activeTagFilter = [...DEFAULT_FILTER];
                renderData(data);
                showToast('已回到最新数据');
            } catch (e) { showToast('加载失败'); }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('已复制: ' + text)).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                showToast('已复制: ' + text);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 1500);
        }

        let searchIndex = null;
        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doSearch();
        });

        async function loadSearchIndex() {
            if (searchIndex) return searchIndex;
            searchIndex = await cachedFetch('/api/search-index');
            return searchIndex;
        }

        async function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { showToast('请输入股票代码、名称或标签'); return; }
            const queryUpper = query.toUpperCase();
            const panel = document.getElementById('searchResults');
            panel.classList.remove('hidden');
            panel.innerHTML = '<p class="search-loading">正在加载搜索索引…</p>';
            try {
                const index = await loadSearchIndex();
                const results = [];
                for (const [code, records] of Object.entries(index)) {
                    for (const r of records) {
                        const codeMatch = code.includes(query);
                        const nameMatch = (r.name || '').toUpperCase().includes(queryUpper);
                        const tagMatch = (r.tags || []).some(t => t.includes(query));
                        if (codeMatch || nameMatch || tagMatch) {
                            results.push({ code, ...r });
                        }
                    }
                }
                if (results.length === 0) {
                    panel.innerHTML = `<h3>搜索结果: "${esc(query)}"</h3><p class="search-loading">未在任何历史记录中找到匹配的股票或标签。</p>`;
                } else {
                    let html = `<h3>搜索结果: "${esc(query)}" — 共 ${results.length} 条记录</h3>`;
                    html += results.map(r => {
                        const changeCls = r.change_pct >= 0 ? 'price-up' : 'price-down';
                        const changeSign = r.change_pct >= 0 ? '+' : '';
                        return `<div class="search-result-item" onclick="loadScan(${r.scanId})">
                            <span class="sr-symbol">${esc(r.code)} ${esc(r.name || '')}</span>
                            <span class="sr-time">${esc(r.scanTime)}</span>
                            <span class="sr-price ${changeCls}">${fmtPrice(r.price)} (${changeSign}${r.change_pct}%)</span>
                            <div class="sr-tags">${buildTags(r.tags)}</div>
                        </div>`;
                    }).join('');
                    panel.innerHTML = html;
                }
                document.getElementById('btnClearSearch').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                panel.innerHTML = '<h3>搜索结果</h3><p class="search-loading">搜索失败，请重试。</p>';
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('btnClearSearch').classList.add('hidden');
        }

        loadLatest();
    </script>
</body>

</html>
